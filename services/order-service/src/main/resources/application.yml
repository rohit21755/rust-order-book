spring:
  application:
    name: order-service
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/hft}
    username: ${POSTGRES_USER:hft}
    password: ${POSTGRES_PASSWORD:hft}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      service: order-service
      environment: ${HFT_ENV:dev}

# OpenTelemetry — OTLP gRPC to Jaeger collector.
otel:
  service:
    name: order-service
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4317}
      protocol: grpc
  traces:
    sampler: ${OTEL_TRACES_SAMPLER:always_on}   # prod sim: traceidratio with arg 0.01
    sampler.arg: ${OTEL_TRACES_SAMPLER_ARG:1.0}
  metrics:
    exporter: none                              # Prometheus already scrapes us
  propagators: tracecontext,baggage             # W3C
  resource:
    attributes:
      deployment.environment: ${HFT_ENV:dev}

hft:
  observability:
    environment: ${HFT_ENV:dev}
    service-name: order-service
    kafka-tracing-enabled: true
  fix:
    enabled: ${HFT_FIX_ENABLED:false}
    port: ${HFT_FIX_PORT:9876}
    config-classpath: fix/acceptor.cfg
    audit-log: ${HFT_FIX_AUDIT_LOG:/var/log/fix/audit.log}
  grpc:
    host: ${ENGINE_GRPC_HOST:localhost}
    port: ${ENGINE_GRPC_PORT:50051}
    tls-enabled: ${ENGINE_GRPC_TLS:false}
    deadline-ms: 2000
    pool-size: 4
    circuit-breaker:
      failure-rate-threshold: 50
      sliding-window-size: 20
      minimum-number-of-calls: 10
      wait-duration-in-open-state-ms: 5000
      slow-call-duration-threshold-ms: 50

order:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-please-use-32+-bytes-secret}
    issuer: ${JWT_ISSUER:hft-auth-service}
  supported-symbols:
    - BTC-USDT
    - ETH-USDT
    - SOL-USDT
    - ADA-USDT
    - DOGE-USDT
    - XRP-USDT
  limits:
    max-open-orders-per-symbol: 10
    max-position-quantity: 100000
    min-quantity: 0.00000001
  cache:
    order-ttl-hours: 24
    idempotency-ttl-hours: 24
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:29092}
    orders-topic: orders
    dlq-topic: orders.DLQ
    publish-retries: 3
    publish-backoff-millis: 100
    request-timeout-millis: 5000
    delivery-timeout-millis: 15000
    acks: all

logging:
  level:
    root: INFO
    com.hft.order: DEBUG
    org.springframework.security: INFO
