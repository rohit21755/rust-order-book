# Observability stack (compose overlay).
# Usage:
#   docker compose -f docker-compose.yml -f infra/docker/observability.compose.yml up -d jaeger prometheus grafana
version: '3.8'

services:
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      # Dev: trace everything. Prod simulation overrides via env (1% sample) on the Java side.
      SAMPLING_STRATEGIES_FILE: /etc/jaeger/sampling.json
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "14250:14250"   # gRPC (legacy)
      - "14268:14268"   # HTTP collector
    volumes:
      - ./jaeger/sampling.json:/etc/jaeger/sampling.json:ro
    networks:
      - hft-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 15s
      timeout: 3s
      retries: 6

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.enable-admin-api
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - hft-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 3s
      retries: 6

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    networks:
      - hft-network

volumes:
  prometheus_data:
  grafana_data:

networks:
  hft-network:
    external: true
