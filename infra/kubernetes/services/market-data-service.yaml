apiVersion: v1
kind: ConfigMap
metadata: { name: market-data-config, namespace: hft-platform }
data:
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP: "kafka:9092"
  ENGINE_GRPC_HOST: "matching-engine"
  ENGINE_GRPC_PORT: "50051"
  SERVER_PORT: "8083"
  HFT_ENV: "prod-sim"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger.monitoring:4317"
  OTEL_TRACES_SAMPLER: "traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.01"
---
apiVersion: v1
kind: Secret
metadata: { name: market-data-secret, namespace: hft-platform }
type: Opaque
stringData:
  JWT_SECRET: change-me-in-prod-please-use-32+-bytes-secret
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: market-data-service, namespace: hft-platform, labels: { app: market-data-service } }
spec:
  replicas: 2
  selector: { matchLabels: { app: market-data-service } }
  template:
    metadata:
      labels: { app: market-data-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8083"
    spec:
      containers:
        - name: market-data-service
          image: hft/market-data-service:0.1.0
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8083 }]
          envFrom:
            - configMapRef: { name: market-data-config }
            - secretRef:    { name: market-data-secret }
          resources:
            requests: { cpu: "500m", memory: "768Mi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          readinessProbe: { httpGet: { path: /actuator/health/readiness, port: 8083 }, initialDelaySeconds: 25, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /actuator/health/liveness,  port: 8083 }, initialDelaySeconds: 60, periodSeconds: 15 }
---
apiVersion: v1
kind: Service
metadata: { name: market-data-service, namespace: hft-platform }
spec:
  type: ClusterIP
  selector: { app: market-data-service }
  ports: [{ port: 8083, targetPort: 8083 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: market-data-service, namespace: hft-platform }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: market-data-service }
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Pods
      pods:
        metric: { name: websocket_connections_active }
        target: { type: AverageValue, averageValue: "500" }
