apiVersion: v1
kind: ConfigMap
metadata: { name: auth-service-config, namespace: hft-platform }
data:
  R2DBC_URL: "r2dbc:postgresql://postgres:5432/hft"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  SERVER_PORT: "8081"
  HFT_ENV: "prod-sim"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger.monitoring:4317"
  OTEL_TRACES_SAMPLER: "traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.01"
---
apiVersion: v1
kind: Secret
metadata: { name: auth-service-secret, namespace: hft-platform }
type: Opaque
stringData:
  POSTGRES_USER: hft
  POSTGRES_PASSWORD: change-me-please
  JWT_SECRET: change-me-in-prod-please-use-32+-bytes-secret
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: hft-platform, labels: { app: auth-service } }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata:
      labels: { app: auth-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: auth-service
          image: hft/auth-service:0.1.0
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8081 }]
          envFrom:
            - configMapRef: { name: auth-service-config }
            - secretRef:    { name: auth-service-secret }
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: hft-platform }
spec:
  type: ClusterIP
  selector: { app: auth-service }
  ports: [{ port: 8081, targetPort: 8081 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: auth-service, namespace: hft-platform }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: auth-service }
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
