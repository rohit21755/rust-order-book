apiVersion: v1
kind: ConfigMap
metadata: { name: api-gateway-config, namespace: hft-platform }
data:
  AUTH_URL: "http://auth-service:8081"
  ORDER_URL: "http://order-service:8082"
  MARKET_DATA_URL: "http://market-data-service:8083"
  PORTFOLIO_URL: "http://portfolio-service:8084"
  RISK_URL: "http://risk-engine:8085"
  SERVER_PORT: "8080"
  HFT_ENV: "prod-sim"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger.monitoring:4317"
---
apiVersion: v1
kind: Secret
metadata: { name: api-gateway-secret, namespace: hft-platform }
type: Opaque
stringData:
  JWT_SECRET: change-me-in-prod-please-use-32+-bytes-secret
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: api-gateway, namespace: hft-platform, labels: { app: api-gateway } }
spec:
  replicas: 3
  selector: { matchLabels: { app: api-gateway } }
  template:
    metadata:
      labels: { app: api-gateway }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: api-gateway
          image: hft/api-gateway:0.1.0
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: api-gateway-config }
            - secretRef:    { name: api-gateway-secret }
          resources:
            requests: { cpu: "300m", memory: "512Mi" }
            limits:   { cpu: "1500m", memory: "1Gi" }
          readinessProbe: { httpGet: { path: /actuator/health/readiness, port: 8080 }, initialDelaySeconds: 20, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /actuator/health/liveness,  port: 8080 }, initialDelaySeconds: 60, periodSeconds: 15 }
---
apiVersion: v1
kind: Service
metadata: { name: api-gateway, namespace: hft-platform }
spec:
  type: LoadBalancer
  selector: { app: api-gateway }
  ports: [{ port: 8080, targetPort: 8080 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: api-gateway, namespace: hft-platform }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: api-gateway }
  minReplicas: 3
  maxReplicas: 30
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
