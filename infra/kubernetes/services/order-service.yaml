apiVersion: v1
kind: ConfigMap
metadata: { name: order-service-config, namespace: hft-platform }
data:
  R2DBC_URL: "r2dbc:postgresql://postgres:5432/hft"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  SERVER_PORT: "8082"
  KAFKA_BOOTSTRAP: "kafka:9092"
  ENGINE_GRPC_HOST: "matching-engine"
  ENGINE_GRPC_PORT: "50051"
  HFT_ENV: "prod-sim"
  HFT_FIX_ENABLED: "true"
  HFT_FIX_PORT: "9876"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger.monitoring:4317"
  OTEL_TRACES_SAMPLER: "traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.01"
---
apiVersion: v1
kind: Secret
metadata: { name: order-service-secret, namespace: hft-platform }
type: Opaque
stringData:
  POSTGRES_USER: hft
  POSTGRES_PASSWORD: change-me-please
  JWT_SECRET: change-me-in-prod-please-use-32+-bytes-secret
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: order-service, namespace: hft-platform, labels: { app: order-service } }
spec:
  replicas: 3
  selector: { matchLabels: { app: order-service } }
  template:
    metadata:
      labels: { app: order-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: order-service
          image: hft/order-service:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8082, name: http }
            - { containerPort: 9876, name: fix }
          envFrom:
            - configMapRef: { name: order-service-config }
            - secretRef:    { name: order-service-secret }
          resources:
            requests: { cpu: "500m", memory: "768Mi" }
            limits:   { cpu: "2",    memory: "1.5Gi" }
          readinessProbe: { httpGet: { path: /actuator/health/readiness, port: 8082 }, initialDelaySeconds: 25, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /actuator/health/liveness,  port: 8082 }, initialDelaySeconds: 60, periodSeconds: 15 }
          volumeMounts:
            - { name: fix-audit, mountPath: /var/log/fix }
      volumes:
        - name: fix-audit
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata: { name: order-service, namespace: hft-platform }
spec:
  type: ClusterIP
  selector: { app: order-service }
  ports:
    - { name: http, port: 8082, targetPort: 8082 }
    - { name: fix,  port: 9876, targetPort: 9876 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: order-service, namespace: hft-platform }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: order-service }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Pods
      pods:
        metric: { name: kafka_consumer_lag }
        target: { type: AverageValue, averageValue: "1000" }
