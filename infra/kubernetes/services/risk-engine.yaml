apiVersion: v1
kind: ConfigMap
metadata: { name: risk-engine-config, namespace: hft-platform }
data:
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP: "kafka:9092"
  PORTFOLIO_URL: "http://portfolio-service:8084"
  MARKET_DATA_URL: "http://market-data-service:8083"
  SERVER_PORT: "8085"
  HFT_ENV: "prod-sim"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger.monitoring:4317"
  OTEL_TRACES_SAMPLER: "traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.01"
---
apiVersion: v1
kind: Secret
metadata: { name: risk-engine-secret, namespace: hft-platform }
type: Opaque
stringData:
  JWT_SECRET: change-me-in-prod-please-use-32+-bytes-secret
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: risk-engine, namespace: hft-platform, labels: { app: risk-engine } }
spec:
  replicas: 2
  selector: { matchLabels: { app: risk-engine } }
  template:
    metadata:
      labels: { app: risk-engine }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8085"
    spec:
      containers:
        - name: risk-engine
          image: hft/risk-engine:0.1.0
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8085 }]
          envFrom:
            - configMapRef: { name: risk-engine-config }
            - secretRef:    { name: risk-engine-secret }
          resources:
            requests: { cpu: "300m", memory: "512Mi" }
            limits:   { cpu: "1500m", memory: "1Gi" }
          readinessProbe: { httpGet: { path: /actuator/health/readiness, port: 8085 }, initialDelaySeconds: 25, periodSeconds: 5 }
          livenessProbe:  { httpGet: { path: /actuator/health/liveness,  port: 8085 }, initialDelaySeconds: 60, periodSeconds: 15 }
---
apiVersion: v1
kind: Service
metadata: { name: risk-engine, namespace: hft-platform }
spec:
  type: ClusterIP
  selector: { app: risk-engine }
  ports: [{ port: 8085, targetPort: 8085 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: risk-engine, namespace: hft-platform }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: risk-engine }
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
    - type: Pods
      pods:
        metric: { name: kafka_consumer_lag }
        target: { type: AverageValue, averageValue: "1000" }
