# Zookeeper + Kafka StatefulSets. Single-broker dev sizing; bump replicas + KAFKA_*_FACTOR for prod.
apiVersion: v1
kind: Service
metadata: { name: zookeeper, namespace: hft-platform, labels: { app: zookeeper } }
spec:
  clusterIP: None
  selector: { app: zookeeper }
  ports: [{ port: 2181, name: client }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: zookeeper, namespace: hft-platform }
spec:
  serviceName: zookeeper
  replicas: 1
  selector: { matchLabels: { app: zookeeper } }
  template:
    metadata: { labels: { app: zookeeper } }
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          env:
            - { name: ZOOKEEPER_CLIENT_PORT, value: "2181" }
            - { name: ZOOKEEPER_TICK_TIME, value: "2000" }
          ports: [{ containerPort: 2181 }]
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe: { tcpSocket: { port: 2181 }, periodSeconds: 5 }
          livenessProbe:  { tcpSocket: { port: 2181 }, periodSeconds: 10 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/zookeeper/data }
            - { name: logs, mountPath: /var/lib/zookeeper/log }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 2Gi } } }
    - metadata: { name: logs }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 2Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: kafka, namespace: hft-platform, labels: { app: kafka } }
spec:
  clusterIP: None
  selector: { app: kafka }
  ports:
    - { port: 9092, name: broker }
    - { port: 9101, name: jmx }
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: kafka, namespace: hft-platform }
spec:
  serviceName: kafka
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - { containerPort: 9092 }
            - { containerPort: 9101 }
          env:
            - { name: KAFKA_BROKER_ID, value: "1" }
            - { name: KAFKA_ZOOKEEPER_CONNECT, value: "zookeeper:2181" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_JMX_PORT, value: "9101" }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          readinessProbe: { tcpSocket: { port: 9092 }, initialDelaySeconds: 20, periodSeconds: 10 }
          livenessProbe:  { tcpSocket: { port: 9092 }, initialDelaySeconds: 60, periodSeconds: 20 }
          volumeMounts: [{ name: data, mountPath: /var/lib/kafka/data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 20Gi } } }
