apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: hft-platform, labels: { app: postgres } }
spec:
  clusterIP: None
  selector: { app: postgres }
  ports: [{ port: 5432, name: pg }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: postgres, namespace: hft-platform }
spec:
  serviceName: postgres
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports: [{ containerPort: 5432 }]
          envFrom:
            - secretRef: { name: postgres-credentials }
          env:
            - { name: POSTGRES_DB, value: hft }
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          readinessProbe:
            exec: { command: ["pg_isready","-U","hft","-d","hft"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["pg_isready","-U","hft","-d","hft"] }
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Secret
metadata: { name: postgres-credentials, namespace: hft-platform }
type: Opaque
stringData:
  POSTGRES_USER: hft
  POSTGRES_PASSWORD: change-me-please
