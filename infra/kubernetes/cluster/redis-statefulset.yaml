apiVersion: v1
kind: Service
metadata: { name: redis, namespace: hft-platform, labels: { app: redis } }
spec:
  clusterIP: None
  selector: { app: redis }
  ports: [{ port: 6379, name: redis }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: redis, namespace: hft-platform }
spec:
  serviceName: redis
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          args: ["redis-server","--appendonly","yes","--save","60","1","--loglevel","warning"]
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe: { exec: { command: ["redis-cli","ping"] }, periodSeconds: 5 }
          livenessProbe:  { exec: { command: ["redis-cli","ping"] }, periodSeconds: 10 }
          volumeMounts: [{ name: data, mountPath: /data }]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources: { requests: { storage: 5Gi } }
